name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version for the release (e.g. v3.0.0)"
        required: true

permissions:
  contents: write   # required to create the GitHub Release + upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Determine version
        id: ver
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$VERSION" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Refusing unsafe version string: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish (self-contained, win-x64)
        run: >
          dotnet publish "ASA-Manager/ARK Server Creation Tool.csproj"
          -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false
          -o publish

      - name: Package ZIP
        shell: pwsh
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: Compress-Archive -Path publish/* -DestinationPath "ARK-Server-Creation-Tool-$env:VERSION-win-x64.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: "ARK-Server-Creation-Tool-*.zip"
